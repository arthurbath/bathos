name: bathos-tasks-module-reconnection

services:
  mongo:
    image: mongo:7.0
    command: --replSet rs0 --bind_ip_all --quiet
    restart: unless-stopped
    volumes:
      - mongo_storage:/data/db

  mongo-rs-init:
    image: mongo:7.0
    depends_on:
      - mongo
    restart: on-failure
    entrypoint:
      - bash
      - -c
      - >-
        mongosh --host mongo:27017 --eval
        'try{rs.status().ok && quit(0)} catch {}
        rs.initiate({_id: "rs0", version: 1, members: [{_id: 0, host: "mongo:27017"}]})'

  powersync:
    image: journeyapps/powersync-service:1.23.3
    command: ["start", "-r", "unified"]
    restart: unless-stopped
    depends_on:
      mongo-rs-init:
        condition: service_completed_successfully
    volumes:
      - ./powersync:/config:ro
    environment:
      POWERSYNC_CONFIG_PATH: /config/service.yaml
      NODE_OPTIONS: --max-old-space-size=768
      PS_DATA_SOURCE_URI: postgresql://postgres:postgres@supabase_db_rsqfokyqntmtdejfwmjs:5432/postgres
      PS_MONGO_URI: mongodb://mongo:27017/bathos_tasks_module_reconnection
      PS_JWKS_URL: http://kong:8000/auth/v1/.well-known/jwks.json
      PS_PORT: "8081"
    ports:
      - "8081:8081"
    networks:
      - default
      - supabase
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://localhost:8081/probes/liveness').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))
      interval: 5s
      timeout: 2s
      retries: 20

networks:
  supabase:
    external: true
    name: supabase_network_rsqfokyqntmtdejfwmjs

volumes:
  mongo_storage:
