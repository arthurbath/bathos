# yaml-language-server: $schema=https://unpkg.com/@powersync/service-schema@1.23.3/json-schema/powersync-config.json

_type: self-hosted

telemetry:
  disable_telemetry_sharing: true

replication:
  connections:
    - type: postgresql
      uri: !env PS_DATA_SOURCE_URI
      sslmode: disable

storage:
  type: mongodb
  uri: !env PS_MONGO_URI

port: !env PS_PORT

sync_config:
  path: sync-config.yaml

client_auth:
  supabase: true
  jwks_uri: !env PS_JWKS_URL
  audience: ["authenticated"]

system:
  logging:
    level: info
    format: text
