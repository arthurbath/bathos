# yaml-language-server: $schema=https://unpkg.com/@powersync/service-sync-rules@1.23.3/schema/sync_rules.json

config:
  edition: 3

streams:
  owner_tasks:
    auto_subscribe: true
    queries:
      - SELECT * FROM tasks_areas WHERE owner_id = auth.user_id()
      - SELECT * FROM tasks_projects WHERE owner_id = auth.user_id()
      - SELECT * FROM tasks_headings WHERE owner_id = auth.user_id()
      - SELECT * FROM tasks_todos WHERE owner_id = auth.user_id()
      - SELECT * FROM tasks_checklist_items WHERE owner_id = auth.user_id()
      - SELECT * FROM tasks_history_events WHERE owner_id = auth.user_id()
      - SELECT * FROM tasks_hierarchy_operations WHERE owner_id = auth.user_id()
      - SELECT * FROM tasks_hierarchy_history_events WHERE owner_id = auth.user_id()
      - SELECT * FROM tasks_user_settings WHERE owner_id = auth.user_id()
      - SELECT * FROM tasks_templates WHERE owner_id = auth.user_id()
      - SELECT * FROM tasks_template_revisions WHERE owner_id = auth.user_id()
      - SELECT * FROM tasks_template_instantiations WHERE owner_id = auth.user_id()
      - SELECT * FROM tasks_recurrence_definitions WHERE owner_id = auth.user_id()
      - SELECT * FROM tasks_recurrence_revisions WHERE owner_id = auth.user_id()
      - SELECT * FROM tasks_recurrence_occurrences WHERE owner_id = auth.user_id()
      - SELECT * FROM tasks_recurrence_evaluations WHERE owner_id = auth.user_id()
      - SELECT * FROM tasks_recurrence_status_events WHERE owner_id = auth.user_id()
      - SELECT * FROM tasks_reminders WHERE owner_id = auth.user_id()
      - SELECT * FROM tasks_reminder_occurrences WHERE owner_id = auth.user_id()
      - SELECT * FROM tasks_delivery_targets WHERE owner_id = auth.user_id()
      - SELECT * FROM tasks_reminder_deliveries WHERE owner_id = auth.user_id()
      - SELECT * FROM tasks_reminder_claims WHERE owner_id = auth.user_id()
